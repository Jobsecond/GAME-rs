[package]
name = "game-crabml"
version = "0.1.0"
edition = "2024"

[features]
default = ["gpu"]
gpu = ["dep:wgpu", "dep:pollster"]

[dependencies]
bytemuck = { version = "1", features = ["derive"] }
clap = { version = "4", features = ["derive"] }
env_logger = "0.11"
hound = "3"
log = "0.4"
midly = "0.5"
pollster = { version = "0.4", optional = true }
rand = "0.8"
rand_mt = "4"
rayon = "1"
realfft = "3"
serde_json = "1"
wgpu = { version = "24", optional = true }

[profile.release]
lto = "thin"
codegen-units = 1
