[workspace]
members = ["crates/core", "crates/audio", "crates/output"]
resolver = "2"

[package]
name = "game-cli"
version = "0.1.0"
edition = "2024"

[features]
default = []
gpu = ["game-core/gpu", "dep:wgpu"]
mkl = ["game-core/mkl"]
cpu-attention-gemm-gemm = ["game-core/cpu-attention-gemm-gemm"]
cpu-attention-gemm-matrixmultiply = ["game-core/cpu-attention-gemm-matrixmultiply"]

[dependencies]
clap = { version = "4", features = ["derive"] }
game-audio = { path = "crates/audio" }
game-core = { path = "crates/core", default-features = false }
game-output = { path = "crates/output" }
env_logger = "0.11"
log = "0.4"
rand = "0.8"
rayon = "1"
serde_json = "1"
wgpu = { version = "24", optional = true }

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
