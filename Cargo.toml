[workspace]
members = ["crates/core", "crates/audio", "crates/output", "crates/service"]
resolver = "2"

[package]
name = "game-cli"
version = "0.1.0"
edition = "2024"

[features]
default = []
gpu = ["game-core/gpu", "game-service/gpu"]
mkl = ["game-core/mkl", "game-service/mkl"]
cpu-attention-gemm-gemm = ["game-core/cpu-attention-gemm-gemm", "game-service/cpu-attention-gemm-gemm"]
cpu-attention-gemm-matrixmultiply = ["game-core/cpu-attention-gemm-matrixmultiply", "game-service/cpu-attention-gemm-matrixmultiply"]

[dependencies]
clap = { version = "4", features = ["derive"] }
game-core = { path = "crates/core", default-features = false }
game-service = { path = "crates/service", default-features = false }
env_logger = "0.11"
log = "0.4"
serde_json = "1"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
