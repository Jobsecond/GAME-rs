[package]
name = "game-crabml"
version = "0.1.0"
edition = "2024"

[features]
default = ["gpu"]
gpu = ["dep:wgpu", "dep:pollster"]

[dependencies]
bytemuck = { version = "1", features = ["derive"] }
clap = { version = "4", features = ["derive"] }
hound = "3"
midly = "0.5"
pollster = { version = "0.4", optional = true }
rand = "0.8"
rand_mt = "4"
realfft = "3"
serde_json = "1"
wgpu = { version = "24", optional = true }
